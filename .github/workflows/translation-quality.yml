name: Translation quality

on:
  push:
    branches:
      - master
      - "feat/**"
  pull_request:

permissions:
  contents: read

jobs:
  es419:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run ES-419 quality checks
        run: python -m unittest discover -s tests -v

      - name: Build ES-419 translation
        run: >-
          python scripts/build_translation_bin.py
          translations/es419.csv
          -o output/translation_es419.bin
